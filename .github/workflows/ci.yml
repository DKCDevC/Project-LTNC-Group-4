name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test (Java 25)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn -B clean verify

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-reports
        path: '**/target/surefire-reports/'

  release:
    name: Auto Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Package with Maven
      run: mvn -B package -DskipTests

    - name: Determine Tag Name
      id: tag_name
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Create/Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_name.outputs.tag }}
        name: ${{ steps.tag_name.outputs.tag == 'latest' && 'Latest Stable Build' || steps.tag_name.outputs.tag }}
        files: |
          auction-server/target/*.jar
          auction-client/target/*.jar
        draft: false
        prerelease: ${{ steps.tag_name.outputs.tag == 'latest' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
